version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "27017:27017"
    volumes:
      - mongoData_Discord:/data/db

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: dragonbot:latest
    depends_on:
      - mongo
    environment:
      - NODE_ENV=prod
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/dragonbot
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - Enviroment=${Enviroment}
    ports:
      - "3000:3000"
    restart: unless-stopped
    command: ["bash","-c","/usr/local/bin/wait-for-mongo.sh mongo 27017 && node dist/src/index.js"]

volumes:
  mongoData_Discord:

name: CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run linter (if available)
        run: npm run lint --if-present

  test:
    name: Tests
    # Run inside a Docker container that includes OpenSSL 1.1 (Debian Bullseye image)
    runs-on: ubuntu-latest
    container:
      image: node:18-bullseye
    services:
      mongo:
        image: mongo:6.0
        # Start mongod with replica set enabled so tests that require transactions work in CI
        options: '--health-cmd "mongosh --eval \"db.adminCommand({ ping: 1 })\"" --health-interval 5s --health-timeout 2s --health-retries 5'
        command: "--replSet rs0 --bind_ip_all"
        ports:
          - 27017:27017
    needs: lint
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore node modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (if available)
        run: npm run typecheck --if-present

      - name: lint (if available)
        run: npm run lint --if-present

      - name: Install mongosh
        run: |
          apt-get update
          apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://pgp.mongodb.com/server-6.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-6.0.gpg
          echo "deb [ signed-by=/usr/share/keyrings/mongodb-server-6.0.gpg ] https://repo.mongodb.org/apt/debian bullseye/mongodb-org/6.0 main" \
            > /etc/apt/sources.list.d/mongodb-org-6.0.list
          apt-get update
          apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize Mongo replica set
        env:
          MONGO_URL: mongodb://mongo:27017/admin
        run: |
          # Initiate replset (safe to re-run)
          mongosh "$MONGO_URL" --eval 'try { rs.status() } catch(e) { rs.initiate({_id:"rs0", members:[{_id:0, host:"mongo:27017"}]}) }'
          # Wait for PRIMARY
          mongosh "$MONGO_URL" --eval 'for (let i=0; i<60; i++) { try { const s=rs.status(); if (s.myState===1) { print("PRIMARY"); quit(0); } } catch(e) {} sleep(1000); } print("Timed out waiting for PRIMARY"); quit(1)'

      - name: Seed DB
        env:
          CI: true
          MONGO_URL: mongodb://mongo:27017/testdb
        run: |
          # Run the seeding script — it will initiate the replset and wait for primary if needed
          node scripts/seedTestDb.js

      - name: Run tests (vitest)
        env:
          CI: true
          MONGO_URL: mongodb://mongo:27017/testdb
        run: |
          # Use fewer workers to be gentle on CI runners and reduce memory pressure
          npx vitest --run --reporter=dot --maxWorkers=2 --coverage

      - name: Run tests with JUnit reporter (artifact)
        env:
          CI: true
        run: |
          # Produce JUnit XML for test reporting
          npx vitest --run --reporter junit --reporter-options "output=vitest-junit.xml" --maxWorkers=2 || true

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit
          path: vitest-junit.xml

# Note: to test MongoDB transactions in CI, run mongodb-memory-server in replica-set mode or use a hosted
# MongoDB with transactions enabled in a separate job. Replica-set setup increases CI runtime.

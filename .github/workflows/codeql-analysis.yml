name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    # Analyze PRs targeting the default branch
    branches: [master]
  schedule:
    - cron: "0 0 * * 0" # weekly

permissions:
  actions: read
  security-events: write

jobs:
  analyze:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          # Enable JavaScript/TypeScript analysis and GitHub Actions analysis
          languages: javascript,actions

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          # Upload results to the repository's code scanning alerts
          category: "security"
